<!DOCTYPE html>
<html>
<head>
  <title>Farmer Community</title>
</head>
<body>

<h2>🌾 Farmer Community (Ask & Answer)</h2>

<!-- CREATE POST -->
<input id="title" placeholder="Enter title">
<br><br>
<textarea id="desc" placeholder="Describe your problem"></textarea>
<br><br>
<button onclick="createPost()">Post Question</button>

<hr>

<h3>All Posts</h3>
<div id="posts"></div>

<script>

// ✅ Create post
async function createPost() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  const user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    alert("Please login first");
    return;
  }

  await fetch("http://localhost:5000/create-post", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      farmer_id: user._id,
      title: title,
      description: desc,
      crop_type: "rice",
      category: "Pest Control Expert",
      language: "English"
    })
  });

  alert("Post created!");
  loadPosts(); // ✅ moved inside
}

// ✅ Load posts
async function loadPosts() {
  const res = await fetch("http://localhost:5000/posts");
  const posts = await res.json();

  const container = document.getElementById("posts");
  container.innerHTML = "";

  posts.forEach(post => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h4>${post.title}</h4>
      <p>${post.description}</p>

      <button onclick="viewAnswers('${post._id}')">View Answers</button>

      <hr>
    `;

    container.appendChild(div);
  });
}

// ✅ View answers
async function viewAnswers(postId) {
  const res = await fetch(`http://localhost:5000/answers/${postId}`);
  const answers = await res.json();

  let text = "Answers:\n\n";

  if (answers.length === 0) {
    text += "No answers yet";
  } else {
    answers.forEach(a => {
      text += "- " + a.answer_text + "\n";
    });
  }

  alert(text);
}

// load initially
loadPosts();

</script>

</body>
</html>
