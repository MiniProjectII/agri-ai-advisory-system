<!DOCTYPE html>
<html>
<body>

<h2>👨‍🔬 Available Experts</h2>

<div id="experts"></div>

<script>

async function loadExperts() {
  const res = await fetch("http://localhost:5000/experts");
  const experts = await res.json();

  console.log("Experts:", experts); // 🔥 debug

  const container = document.getElementById("experts");
  container.innerHTML = "";

  if (experts.length === 0) {
    container.innerHTML = "<p>No experts found</p>";
    return;
  }

  experts.forEach(exp => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${exp.name}</h3>
      <p>Languages: ${exp.languages?.join(", ")}</p>
      <p>⭐ Rating: ${(exp.rating || 0).toFixed(1)}</p>
      <button onclick="startChat('${exp._id}')">Chat</button>
      <hr>
    `;

    container.appendChild(div);
  });
}

async function startChat(expertId) {
  const user = JSON.parse(localStorage.getItem("user"));

  await fetch("http://localhost:5000/request-chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      farmer_id: user._id,
      expert_id: expertId   // ✅ SAME ID
    })
  });

  window.location.href = `chat.html?farmer=${user._id}&expert=${expertId}`;
}

loadExperts();

</script>

</body>
</html>
