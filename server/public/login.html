<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>🔐 Login</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<select id="role">
  <option value="farmer">Farmer</option>
  <option value="expert">Expert</option>
</select>

<br><br>

<button onclick="login()">Login</button>

<hr>

<h3>New User? Register</h3>

<input id="rname" placeholder="Name"><br><br>
<input id="remail" placeholder="Email"><br><br>
<input id="rpassword" type="password" placeholder="Password"><br><br>

<select id="rrole">
  <option value="farmer">Farmer</option>
  <option value="expert">Expert</option>
</select>

<br><br>

<button onclick="register()">Register</button>

<script>

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const params = new URLSearchParams(window.location.search);
const role = params.get("role");

  const res = await fetch("http://localhost:5000/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.message || "Login failed");
    return;
  }

  console.log("Login success:", data);

  localStorage.setItem("user", JSON.stringify(data.user));
  localStorage.setItem("token", data.token);

 if (data.user.role === "expert") {
  window.location.href = "expert.html";
} else {
  window.location.href = "posts.html"; // farmer page
}
}

// REGISTER
async function register() {
  const name = document.getElementById("rname").value;
  const email = document.getElementById("remail").value;
  const password = document.getElementById("rpassword").value;
  const role = document.getElementById("rrole").value;

  await fetch("http://localhost:5000/auth/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, email, password, role })
  });

  alert("Registered! Now login.");
}

</script>

</body>
</html>
