<!DOCTYPE html>
<html>
<head>
  <title>Farmer Expert Chat</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>

<div class="chat-container">

  <!-- HEADER -->
  <div class="chat-header">
    Farmer ↔ Expert Chat
    <div id="status" class="status">Offline 🔴</div>
  </div>

  <!-- HIDDEN INPUTS -->
  <input id="farmer" type="hidden">
  <input id="expert" type="hidden">

  <!-- CHAT BOX -->
  <div id="chat" class="chat-box"></div>

  <!-- TYPING -->
  <p id="typing"></p>

  <!-- INPUT -->
  <div class="input-area">
    <input id="message" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
  </div>

  <hr>

  <!-- ⭐ RATING -->
  <h3>⭐ Rate Expert</h3>

  <select id="rating">
    <option value="5">⭐⭐⭐⭐⭐</option>
    <option value="4">⭐⭐⭐⭐</option>
    <option value="3">⭐⭐⭐</option>
    <option value="2">⭐⭐</option>
    <option value="1">⭐</option>
  </select>

  <button onclick="rateExpert()">Submit Rating</button>

</div>

<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
// ================= PARAMS =================
const params = new URLSearchParams(window.location.search);

const farmerParam = params.get("farmer");
const expertParam = params.get("expert");

// ✅ Logged-in user
const user = JSON.parse(localStorage.getItem("user"));

const currentUser = user?._id || farmerParam || "farmer1";

// store hidden values
if (farmerParam && expertParam) {
  document.getElementById("farmer").value = farmerParam;
  document.getElementById("expert").value = expertParam;
}

const socket = io("http://localhost:5000");

let room = "";
let joined = false;

// ================= LOAD OLD MESSAGES =================
async function loadMessages(room) {
  const res = await fetch(`http://localhost:5000/messages/${room}`);
  const messages = await res.json();

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  messages.forEach(msg => {
    const div = document.createElement("div");

    if (msg.sender === currentUser) {
      div.className = "message you";
    } else {
      div.className = "message other";
    }

    div.innerHTML = `<p>${msg.message}</p>`;
    chat.appendChild(div);
  });
}

// ================= JOIN ROOM =================
function joinRoom() {
  if (joined) return;

  const farmer = currentUser;
  const expert = expertParam || "expert1";

  const ids = [farmer, expert].sort();
  room = ids[0] + "_" + ids[1];

  socket.emit("join_room", room);

  joined = true;

  console.log("Joined room:", room);

  loadMessages(room);
}

// ================= RECEIVE MESSAGE =================
socket.on("receive_message", (data) => {
  const div = document.createElement("div");

  if (data.sender === currentUser) return;

  div.className = "message other";
  div.innerHTML = `<p>${data.message}</p>`;

  document.getElementById("chat").appendChild(div);
});

// ================= SEND MESSAGE =================
function sendMessage() {
  const msg = document.getElementById("message").value;

  if (!msg || !room) {
    alert("Join room first");
    return;
  }

  socket.emit("send_message", {
    room: room,
    message: msg,
    sender: currentUser
  });

  const div = document.createElement("div");
  div.className = "message you";
  div.innerHTML = `<p>${msg}</p>`;

  document.getElementById("chat").appendChild(div);

  document.getElementById("message").value = "";
}

// ================= ⭐ RATE EXPERT =================
async function rateExpert() {
  const rating = document.getElementById("rating").value;

  if (!expertParam) {
    alert("No expert found");
    return;
  }

  await fetch("http://localhost:5000/rate-expert", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      expert_id: expertParam,
      rating: Number(rating)
    })
  });

  alert("Thanks for rating!");
}

// ================= TYPING =================
document.getElementById("message").addEventListener("input", () => {
  if (!room) return;

  socket.emit("typing", room);

  setTimeout(() => {
    socket.emit("stop_typing", room);
  }, 1000);
});

socket.on("show_typing", () => {
  document.getElementById("typing").innerText = "Typing...";
});

socket.on("hide_typing", () => {
  document.getElementById("typing").innerText = "";
});

// ================= ONLINE STATUS =================
socket.on("user_online", () => {
  document.getElementById("status").innerText = "Online 🟢";
});

socket.on("user_offline", () => {
  document.getElementById("status").innerText = "Offline 🔴";
});

// ================= AUTO JOIN =================
if (farmerParam && expertParam) {
  joinRoom();
}
</script>

</body>
</html>
